<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USYD Course Planner - Curation Admin Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars-bg"></div>
    <div class="portal-container">
        <!-- Header Section -->
        <header class="portal-header">
            <div class="header-logo">
                <div class="logo-text">
                    <h1>USYD Course Planner</h1>
                    <p>Manual Curation Interface</p>
                </div>
            </div>
            <!-- Stats Panel -->
            <div class="stats-panel">
                <div class="stat-card">
                    <span class="stat-label">Total Units</span>
                    <span class="stat-value" id="stat-total">0</span>
                </div>
                <div class="stat-card accent-emerald">
                    <span class="stat-label">Curated</span>
                    <span class="stat-value" id="stat-curated">0</span>
                </div>
                <div class="stat-card accent-rose">
                    <span class="stat-label">Needing Curation</span>
                    <span class="stat-value" id="stat-pending">0</span>
                </div>
                <div class="stat-card accent-purple-stat">
                    <span class="stat-label">Flagged</span>
                    <span class="stat-value" id="stat-flagged">0</span>
                </div>
            </div>
        </header>

        <!-- Controls Section -->
        <section class="controls-section">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="Search by unit code or title..." autocomplete="off">
            </div>
            <div class="filter-wrapper">
                <span class="filter-label">Filter:</span>
                <div class="filter-pills">
                    <button class="filter-pill active" data-filter="all">All</button>
                    <button class="filter-pill" data-filter="pending">Needs Curation</button>
                    <button class="filter-pill" data-filter="curated">Curated</button>
                    <button class="filter-pill" data-filter="flagged">Flagged</button>
                </div>
            </div>
        </section>

        <!-- Rules Grid Section -->
        <main class="rules-grid-wrapper">
            <div class="rules-grid" id="rules-grid">
                <!-- Cards will be dynamically injected here -->
                <div class="loading-state">Loading unit of study rules...</div>
            </div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
